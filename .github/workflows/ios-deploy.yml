name: iOS → TestFlight

# Triggers:
#   Push tag v1.0.0 (or any v*.*.*) → automatic build + upload
#   GitHub Actions tab → "Run workflow" → manual build
on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

env:
  WORKSPACE:  frontend/ios/App/App.xcworkspace
  SCHEME:     App
  BUNDLE_ID:  com.valubull.app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required GitHub Secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_API_URL     — your Railway backend URL
#   APPLE_TEAM_ID           — 10-char Apple Developer Team ID
#   ASC_KEY_ID              — App Store Connect API Key ID
#   ASC_ISSUER_ID           — App Store Connect Issuer ID (UUID)
#   ASC_PRIVATE_KEY         — contents of the .p8 private key file (not base64)
#   P12_PASSWORD            — password for the .p12 certificate
#   P12_CERTIFICATE         — base64-encoded Distribution .p12 (from setup-ios-identity.yml)
#   PROVISIONING_PROFILE    — base64-encoded .mobileprovision (from setup-ios-identity.yml)

jobs:
  build-and-upload:
    runs-on: macos-26

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js + web build ──────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export (mobile mode)
        working-directory: frontend
        env:
          NEXT_BUILD_TARGET: mobile
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      # ── 3. Capacitor iOS ─────────────────────────────────────────────────────
      - name: Sync Capacitor iOS (with file integrity guard)
        working-directory: frontend
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          node scripts/native-sync.js

      - name: Commit generated iOS project (first run only)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/ios
          git diff --cached --quiet || git commit -m "chore: sync Capacitor iOS project [skip ci]"
          git push || true

      # ── 4. CocoaPods ─────────────────────────────────────────────────────────
      - name: Cache CocoaPods specs
        uses: actions/cache@v4
        with:
          path: ~/.cocoapods
          key: cocoapods-specs-${{ runner.os }}
          restore-keys: cocoapods-specs-

      - name: Cache Pods directory
        uses: actions/cache@v4
        with:
          path: frontend/ios/App/Pods
          key: pods-${{ hashFiles('frontend/ios/App/Podfile.lock') }}
          restore-keys: pods-

      - name: Pod install
        working-directory: frontend/ios/App
        run: pod install

      # ── 5. Tooling ───────────────────────────────────────────────────────────
      - name: Install xcpretty
        run: gem install xcpretty --no-document

      # ── 6. Code signing ──────────────────────────────────────────────────────
      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password:    ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision
          PROFILE_UUID=$(security cms -D \
            -i ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision \
            | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 7. Archive ────────────────────────────────────────────────────────────
      - name: Archive
        run: |
          sed -i '' "s/CI_PLACEHOLDER/$PROFILE_UUID/" frontend/ios/App/App.xcodeproj/project.pbxproj

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme     "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ValuBull.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            2>&1

      # ── 8. Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          sed \
            -e "s/__TEAM_ID__/${{ secrets.APPLE_TEAM_ID }}/g" \
            -e "s/__PROFILE_UUID__/$PROFILE_UUID/g" \
            frontend/ios/App/App/ExportOptions.plist \
            > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ValuBull.xcarchive" \
            -exportPath  "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ── 9. Upload to TestFlight ───────────────────────────────────────────────
      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "${{ secrets.ASC_PRIVATE_KEY }}" \
            > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$(ls "$RUNNER_TEMP/ipa/"*.ipa)" \
            --apiKey    "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" \
            --verbose

      # ── 10. Save IPA as artifact ──────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ValuBull-${{ github.ref_name }}-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
